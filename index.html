<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1577dd" />
  <title>競泳タイマー</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231577dd'/%3E%3Ccircle cx='16' cy='17' r='7' fill='none' stroke='%23ffffff' stroke-width='3'/%3E%3Crect x='14' y='4' width='4' height='3' rx='1' fill='%23ffffff'/%3E%3Ccircle cx='25' cy='8' r='2.5' fill='%23ff7a1a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app">

    <!-- 役割選択 -->
    <section id="screen-role" class="screen">
      <h1 class="title">競泳タイマー<span class="sub">PoC</span></h1>
      <svg class="wave" viewBox="0 0 120 8" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 4 Q15 0 30 4 T60 4 T90 4 T120 4" fill="none" stroke="var(--orange)" stroke-width="1.6" />
      </svg>
      <p class="lead">この端末の役割を選んでください。</p>
      <div class="role-grid">
        <button class="role-btn role-starter" data-role="starter">
          <span class="role-name">スターター</span>
          <span class="role-desc">合図を出して全端末を同時にスタート</span>
        </button>
        <button class="role-btn role-recorder" data-role="recorder">
          <span class="role-name">記録者</span>
          <span class="role-desc">レーンを担当してラップ・ゴールを記録</span>
        </button>
      </div>
      <div class="util-row">
        <button class="ghost" data-go="members">👥 メンバー登録</button>
        <button class="ghost" data-go="records">📋 記録を見る</button>
      </div>
    </section>

    <!-- スターター -->
    <section id="screen-starter" class="screen" hidden>
      <header class="bar">
        <button class="ghost back" data-back>← 戻る</button>
        <span class="bar-title">スターター</span>
        <span class="spacer"></span>
      </header>

      <div id="starter-config">
      <div class="pool-pick">
        <span>モード</span>
        <div class="seg" id="mode-seg">
          <button data-mode="practice" class="on">練習</button>
          <button data-mode="meet">記録会</button>
        </div>
      </div>
      <p class="hint" id="mode-note" hidden>記録会モードは次のステップで対応します（現在は練習として動作します）。</p>

      <div class="pool-pick">
        <span>プール</span>
        <div class="seg" id="pool-seg">
          <button data-pool="25" class="on">25m</button>
          <button data-pool="50">50m</button>
        </div>
      </div>

      <div class="pool-pick">
        <span>ラップ</span>
        <div class="seg" id="lap-seg">
          <button data-lap="none">無し</button>
          <button data-lap="start">スタート側</button>
          <button data-lap="both" class="on">両方</button>
        </div>
      </div>

      <button id="sound-toggle" class="ghost sound-toggle">🔊 音の設定 ▾</button>
      <div class="sound-box" id="sound-box" hidden>
        <div class="sound-row">
          <label for="pitch">高さ</label>
          <input id="pitch" type="range" min="800" max="2500" step="10" />
          <span id="pitch-val" class="pitch-val">—</span>
          <button id="btn-test-sound" class="ghost">🔊 テスト</button>
        </div>
        <div class="sound-row">
          <label for="vol">音量</label>
          <input id="vol" type="range" min="0.2" max="2" step="0.05" />
          <span id="vol-val" class="pitch-val">—</span>
        </div>
      </div>
      </div><!-- /starter-config -->

      <div class="state-line">状態：<b id="starter-state">準備OK</b></div>

      <div class="starter-actions">
        <button id="btn-start" class="big start">スタート</button>
        <div class="row" hidden id="running-actions">
          <button id="btn-end" class="big blue">終了して保存</button>
          <button id="btn-reset" class="big ghost danger">リセット</button>
        </div>
      </div>

      <div class="big-clock" id="starter-clock" hidden>0.00</div>

      <div class="lanes" id="starter-lanes"></div>
      <p class="hint" id="starter-hint">記録者がレーンと選手を設定すると、ここに表示されます（スタートしてよいか確認できます）。</p>
    </section>

    <!-- 記録者：レーン選択＋選手＋種目 -->
    <section id="screen-recorder-setup" class="screen" hidden>
      <header class="bar">
        <button class="ghost back" data-back>← 戻る</button>
        <span class="bar-title">記録者</span>
        <span class="spacer"></span>
      </header>

      <p class="lead">担当するレーンを選んでください。</p>
      <div class="lane-pick" id="lane-pick"></div>

      <div id="assign-area" hidden>
        <div class="frow">
          <label class="field"><span>種目</span>
            <select id="ev-stroke">
              <option value="">（自由計測）</option>
              <option value="自由形">自由形</option>
              <option value="平泳ぎ">平泳ぎ</option>
              <option value="背泳ぎ">背泳ぎ</option>
              <option value="バタフライ">バタフライ</option>
              <option value="個人メドレー">個人メドレー</option>
              <option value="フリーリレー">フリーリレー</option>
              <option value="メドレーリレー">メドレーリレー</option>
            </select>
          </label>
          <label class="field" id="dist-field" hidden><span>距離</span>
            <select id="ev-dist"></select>
          </label>
        </div>
        <label class="field" id="single-swimmer-field">
          <span>選手を選ぶ</span>
          <select id="swimmer-pick"><option value="">— 選手を選択 —</option></select>
        </label>
        <div id="relay-legs" hidden></div>
      </div>

      <label class="check">
        <input id="ring-here" type="checkbox" />
        <span>この端末でも発進音を鳴らす</span>
      </label>

      <button id="btn-join" class="big start" disabled>このレーンで記録する</button>
      <p class="hint" id="setup-hint" hidden>選手がいない場合は「メンバー登録」から追加してください。</p>
    </section>

    <!-- 記録者：計測 -->
    <section id="screen-recorder" class="screen" hidden>
      <header class="bar">
        <button class="ghost back" data-back>← レーン変更</button>
        <span class="bar-title"><b id="rec-lane-label">レーン</b></span>
        <span class="spacer"></span>
      </header>

      <div class="rec-swimmer-name" id="rec-swimmer">—</div>
      <div class="rec-event" id="rec-event"></div>
      <div class="rec-status" id="rec-status">スターターの準備を待っています…</div>

      <div class="big-clock" id="rec-clock">0.00</div>

      <button id="btn-split" class="huge split" disabled>ラップ / ゴール</button>

      <div class="splits" id="splits"></div>
    </section>

    <!-- メンバー登録 -->
    <section id="screen-members" class="screen" hidden>
      <header class="bar">
        <button class="ghost back" data-back>← 戻る</button>
        <span class="bar-title">メンバー登録</span>
        <span class="spacer"></span>
      </header>

      <div class="mform">
        <label class="field"><span>氏名</span>
          <input id="m-name" type="text" placeholder="例）山田 太郎" />
        </label>
        <div class="frow">
          <label class="field"><span>学年</span>
            <select id="m-grade">
              <option value="1">1年</option>
              <option value="2" selected>2年</option>
              <option value="3">3年</option>
            </select>
          </label>
          <label class="field"><span>性別</span>
            <select id="m-gender">
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </label>
        </div>
        <label class="field"><span>学校</span>
          <input id="m-school" type="text" value="鎌倉高校" />
        </label>
        <label class="check"><input id="m-guest" type="checkbox" /><span>ゲスト（他校・一時登録）</span></label>
        <div class="row2">
          <button id="btn-add-member" class="big blue">追加する</button>
          <button id="btn-cancel-edit" class="ghost" hidden>編集をやめる</button>
        </div>
      </div>

      <div class="list-head">
        <span>登録メンバー</span>
        <div class="seg msort" id="msort">
          <button data-sort="grade" class="on">学年順</button>
          <button data-sort="school">学校順</button>
        </div>
      </div>
      <div class="mlist" id="mlist"></div>
    </section>

    <!-- 記録一覧 -->
    <section id="screen-records" class="screen" hidden>
      <header class="bar">
        <button class="ghost back" data-back>← 戻る</button>
        <span class="bar-title">記録</span>
        <span class="spacer"></span>
      </header>
      <label class="field"><span>選手で絞り込み</span>
        <select id="rec-filter">
          <option value="">— 選手を選択 —</option>
          <option value="__all">全員</option>
        </select>
      </label>
      <div class="rlist" id="rlist"></div>
    </section>

  </main>

  <footer id="diag">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-text">接続中…</span>
    <span class="diag-sep">|</span>
    <span>ズレ <b id="offset-val">—</b> ms</span>
    <span class="diag-sep">|</span>
    <span>同期時計 <b id="sync-clock">—</b></span>
  </footer>

  <div id="flash" aria-hidden="true"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
